<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spendly – Budget Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Righteous&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <canvas id="money-canvas" aria-hidden="true"></canvas>

  <nav class="navbar">
    <div class="navbar__brand">
      <span class="navbar__logo">💸</span>
      <span class="navbar__name">Spendly</span>
    </div>
    <span class="navbar__tagline">your money, your rules</span>
  </nav>

  <main class="layout">

    <!-- LEFT: form -->
    <section class="card card--form">
      <div class="card__header">
        <h2 class="card__title">Set up your budget</h2>
        <p class="card__subtitle">Enter your salary, then log expenses one by one.</p>
      </div>

      <div class="field-group">
        <label class="field-label" for="salary-input">
          <span class="field-label__icon">🏦</span> Total Salary
        </label>
        <div class="input-wrap">
          <span class="input-prefix">₹</span>
          <input class="input-field" id="salary-input" type="number" min="0" placeholder="e.g. 50000"/>
        </div>
        <button class="btn btn--primary" id="set-salary-btn">Set Salary</button>
        <p class="error-msg" id="salary-error" aria-live="polite"></p>
      </div>

      <div class="divider"><span class="divider__text">then add expenses</span></div>

      <div class="field-group">
        <label class="field-label" for="expense-name">
          <span class="field-label__icon">🏷️</span> Expense Name
        </label>
        <input class="input-field" id="expense-name" type="text" placeholder="e.g. Rent, Netflix, Food…"/>

        <label class="field-label" for="expense-amount" style="margin-top:1rem">
          <span class="field-label__icon">💰</span> Expense Amount
        </label>
        <div class="input-wrap">
          <span class="input-prefix">₹</span>
          <input class="input-field" id="expense-amount" type="number" min="0" placeholder="e.g. 12000"/>
        </div>
        <button class="btn btn--accent" id="add-expense-btn">+ Add Expense</button>
        <p class="error-msg" id="expense-error" aria-live="polite"></p>
      </div>

      <!-- Pie chart lives here -->
      <div class="chart-wrap">
        <canvas id="pie-chart"></canvas>
        <p class="chart-empty" id="chart-empty">Add expenses to see your breakdown 📊</p>
      </div>
    </section>

    <!-- RIGHT: summary -->
    <section class="card card--summary">

      <div class="balance-board">
        <div class="balance-item">
          <span class="balance-item__label">Total Salary</span>
          <span class="balance-item__value" id="display-salary">₹ —</span>
        </div>
        <div class="balance-item">
          <span class="balance-item__label">Total Spent</span>
          <span class="balance-item__value balance-item__value--spent" id="display-spent">₹ —</span>
        </div>
        <div class="balance-item balance-item--remaining">
          <span class="balance-item__label">Remaining 🎯</span>
          <span class="balance-item__value balance-item__value--remaining" id="display-remaining">₹ —</span>
        </div>
      </div>

      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-bar__fill" id="progress-fill"></div>
        </div>
        <span class="progress-label" id="progress-label">0% spent</span>
      </div>

      <div class="expenses-section">
        <h3 class="expenses-title">Expense Log</h3>
        <ul class="expense-list" id="expense-list">
          <li class="expense-list__empty" id="empty-state">
            <span class="empty-icon">🧾</span>
            <span>No expenses yet — add one!</span>
          </li>
        </ul>
      </div>

    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
